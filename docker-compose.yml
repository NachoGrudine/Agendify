version: '3.8'

services:
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: agendify-api
    env_file:
      - .env
    ports:
      - "${API_HTTP_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:8080}
      - ConnectionStrings__DefaultConnection=Server=tcp:${DB_SERVER},${DB_PORT};Initial Catalog=${DB_NAME};Persist Security Info=False;User ID=${DB_USER};Password=${DB_PASSWORD};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
    networks:
      - agendify-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: agendify-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - api
    networks:
      - agendify-network

networks:
  agendify-network:
    driver: bridge

